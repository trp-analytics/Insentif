<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Insentif 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#b6c4dc;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{background:#023188;color:white;padding:15px 20px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between}
.status{padding:5px 12px;background:#1a5fc8;border-radius:20px;font-size:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:15px 0}
.kpi-card{background:white;border-radius:10px;padding:15px;border-top:3px solid}
.kpi-label{font-size:11px;color:#666}
.kpi-value{font-size:24px;font-weight:bold}
.card{background:white;border-radius:10px;margin-bottom:15px}
.card-header{padding:12px 15px;border-bottom:1px solid #eee;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee}
th{color:#666}
td.r{text-align:right}
.filters{margin:15px 0;display:flex;gap:10px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid #ccc;background:white;border-radius:20px;cursor:pointer}
.filter-btn.active{background:#023188;color:white}
select{padding:6px 12px;border-radius:20px}
.loading{text-align:center;padding:40px;color:#666}
.badge-ndc{background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:12px}
.badge-hub{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px}
.nav-menu{display:flex;gap:5px;margin-bottom:15px;background:white;padding:8px 15px;border-radius:10px}
.nav-btn{padding:8px 16px;border:none;background:#eef2f8;border-radius:8px;cursor:pointer}
.nav-btn.active{background:#023188;color:white}
.page{display:none}
.page.active{display:block}
.map-container{height:400px;border-radius:10px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Dashboard Insentif 2026</h1>
    <div class="status" id="statusLabel">Loading data...</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setSite('all',this)">🌐 Semua Site</button>
    <button class="filter-btn" onclick="setSite('ndc',this)">🏭 NDC</button>
    <button class="filter-btn" onclick="setSite('hub',this)">🚚 Hub</button>
    <select id="monthSelect" onchange="setMonth()"><option value="all">Semua Bulan</option></select>
  </div>

  <div class="nav-menu">
    <button class="nav-btn active" onclick="showPage('overview')">Overview</button>
    <button class="nav-btn" onclick="showPage('mpp')">MPP</button>
    <button class="nav-btn" onclick="showPage('map')">Peta</button>
  </div>

  <div id="page-overview" class="page active">
    <div class="kpi-grid" id="kpiGrid"><div class="loading">Loading...</div></div>
    <div class="card">
      <div class="card-header">📋 Ringkasan per Site</div>
      <div style="overflow-x:auto"><table id="summaryTable"><thead><tr><th>Site</th><th>Tipe</th><th class="r">Trip</th><th class="r">DO/Trip</th><th class="r">Insentif</th><th class="r">High</th><th class="r">Mid</th><th class="r">Low</th></tr></thead><tbody id="summaryBody"></tbody></table></div>
    </div>
  </div>

  <div id="page-mpp" class="page">
    <div class="card"><div class="card-header">👥 Daftar MPP</div><div style="overflow-x:auto"><table id="mppTable"><thead><tr><th>Nama</th><th>Role</th><th>Site</th><th>Bulan</th><th class="r">Insentif</th><th>Kategori</th></tr></thead><tbody id="mppBody"></tbody></table></div></div>
  </div>

  <div id="page-map" class="page"><div class="card"><div class="card-header">🗺️ Sebaran Site</div><div id="map" class="map-container"></div></div></div>
</div>

<script>
// ==================== URL GSHEET LO (LANGSUNG) ====================
const URL_2026 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyI8mksdqrv4RF0OBH_Hi2BdZ17fYNBU2_scPnUFb0EkI8QFFRwTEpJtoQvKoXJQaWUoGC7bOhGtB1/pub?output=csv';
const URL_2025 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfY4FSedZDglBnuz8UWZXdhg9LJGDKcAjGEYENyL8rTXAqguTTqZL0IQfwhC0KGFh_8POa0oqM8KMf/pub?output=csv';
// =================================================================

let SITE_2026 = {};
let SITE_2025 = {};
let ALL_MPP = [];
let currentSite = 'all';
let currentMonth = 'all';
let availableMonths = [];
let mapInstance = null;

const NK = ['JBBK','CKP','SDA'];
const HK = ['Hub Bogor','Hub Tangerang','Hub Utara','Hub Bandung','Hub Yogya','Hub Semarang','Hub Lampung','Hub Palembang','Hub Kediri'];
const AK = [...NK,...HK];
const SITE_NAMES = {'JBBK':'Jababeka','CKP':'Cikupa','SDA':'Sidoarjo','Hub Bogor':'Hub Bogor','Hub Tangerang':'Hub Tangerang','Hub Utara':'Hub Utara','Hub Bandung':'Hub Bandung','Hub Yogya':'Hub Yogya','Hub Semarang':'Hub Semarang','Hub Lampung':'Hub Lampung','Hub Palembang':'Hub Palembang','Hub Kediri':'Hub Kediri'};
const SITE_COLORS = {'JBBK':'#1e6fb5','CKP':'#2889d8','SDA':'#5aaff0','Hub Bogor':'#22c55e','Hub Tangerang':'#16a34a','Hub Utara':'#0891b2','Hub Bandung':'#0d9488','Hub Yogya':'#7c3aed','Hub Semarang':'#db2777','Hub Lampung':'#ea580c','Hub Palembang':'#9333ea','Hub Kediri':'#9f1239'};
const SITE_COORDS = {'JBBK':{lat:-6.3644,lng:107.1570},'CKP':{lat:-6.2297,lng:106.5225},'SDA':{lat:-7.4478,lng:112.7183},'Hub Bogor':{lat:-6.5971,lng:106.8060},'Hub Tangerang':{lat:-6.1783,lng:106.6302},'Hub Utara':{lat:-6.1382,lng:106.8636},'Hub Bandung':{lat:-6.9175,lng:107.6191},'Hub Yogya':{lat:-7.7956,lng:110.3695},'Hub Semarang':{lat:-7.0051,lng:110.4381},'Hub Lampung':{lat:-5.4297,lng:105.2610},'Hub Palembang':{lat:-2.9761,lng:104.7754},'Hub Kediri':{lat:-7.8480,lng:112.0115}};

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if(lines.length<2) return [];
  const headers = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const values = [];
    let inQuote=false, curr='';
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"') inQuote=!inQuote;
      else if(c===',' && !inQuote){ values.push(curr); curr=''; }
      else curr+=c;
    }
    values.push(curr);
    const obj={};
    headers.forEach((h,i)=>obj[h]=values[i]?.trim()||'');
    return obj;
  });
}

async function loadData() {
  const status = document.getElementById('statusLabel');
  status.innerHTML = '🔄 Loading data...';
  try {
    const [res26, res25] = await Promise.all([fetch(URL_2026), fetch(URL_2025)]);
    const csv26 = await res26.text();
    const csv25 = await res25.text();
    const data26 = parseCSV(csv26);
    const data25 = parseCSV(csv25);
    
    SITE_2026 = {};
    const monthSet = new Set();
    data26.forEach(row => {
      const site = row.site, month = row.month;
      if(!site||!month) return;
      monthSet.add(month);
      if(!SITE_2026[site]) SITE_2026[site] = {};
      SITE_2026[site][month] = {
        trips: parseInt(row.trips)||0, do_: parseFloat(row.do_)||0, dp: parseInt(row.dp)||0,
        ujp: parseFloat(row.ujp)||0, ins: parseFloat(row.ins)||0,
        mpp_low: parseInt(row.mpp_low)||0, mpp_mid: parseInt(row.mpp_mid)||0, mpp_high: parseInt(row.mpp_high)||0
      };
    });
    
    SITE_2025 = {};
    data25.forEach(row => {
      const site = row.site, month = row.month;
      if(!site||!month) return;
      if(!SITE_2025[site]) SITE_2025[site] = {};
      SITE_2025[site][month] = {
        trips: parseInt(row.trips)||0, do_: parseFloat(row.do_)||0, dp: parseInt(row.dp)||0,
        ujp: parseFloat(row.ujp)||0, ins: parseFloat(row.ins)||0,
        mpp_low: parseInt(row.mpp_low)||0, mpp_mid: parseInt(row.mpp_mid)||0, mpp_high: parseInt(row.mpp_high)||0
      };
    });
    
    const monthOrder = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    availableMonths = Array.from(monthSet).sort((a,b)=>monthOrder.indexOf(a)-monthOrder.indexOf(b));
    const monthSelect = document.getElementById('monthSelect');
    monthSelect.innerHTML = '<option value="all">Semua Bulan</option>'+availableMonths.map(m=>`<option value="${m}">${m}</option>`).join('');
    
    // Buat ALL_MPP dari data 2026
    ALL_MPP = [];
    data26.forEach(row => {
      const ins = parseFloat(row.ins)||0;
      let cat = 'Low';
      if(ins>1500000) cat='High';
      else if(ins>500000) cat='Mid';
      ALL_MPP.push({
        name: row.name || 'Unknown',
        role: row.role || 'Driver',
        site: row.site || '',
        month: row.month || '',
        ins: ins,
        cat: cat
      });
    });
    
    status.innerHTML = `✅ ${Object.keys(SITE_2026).length} site · ${ALL_MPP.length} MPP · ${new Date().toLocaleString()}`;
    renderAll();
    renderMap();
  } catch(e) {
    status.innerHTML = '❌ Gagal load data! Cek koneksi';
    console.error(e);
  }
}

function getSites() {
  if(currentSite==='all') return AK;
  if(currentSite==='ndc') return NK;
  if(currentSite==='hub') return HK;
  return [currentSite];
}
function getMonths() { return currentMonth==='all' ? availableMonths : [currentMonth]; }

function agg(sites, months) {
  let trips=0,do_=0,dp=0,ujp=0,ins=0,ml=0,mm=0,mh=0;
  sites.forEach(s=>months.forEach(m=>{
    const d = SITE_2026[s]?.[m];
    if(!d) return;
    trips+=d.trips; do_+=d.do_; dp+=d.dp; ujp+=d.ujp; ins+=d.ins;
    ml+=d.mpp_low; mm+=d.mpp_mid; mh+=d.mpp_high;
  }));
  return {trips,do_,dp,ujp,ins,ml,mm,mh};
}

function fmt(n) {
  if(!n&&n!==0) return '—';
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return Math.round(n/1e3)+'K';
  return Math.round(n).toLocaleString();
}

function renderKPI() {
  const d = agg(getSites(), getMonths());
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Total Trip</div><div class="kpi-value">${d.trips.toLocaleString()}</div><div class="kpi-sub">${getSites().length} site</div></div>
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Total DO</div><div class="kpi-value">${d.do_.toLocaleString()}</div></div>
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Drop Point</div><div class="kpi-value">${d.dp.toLocaleString()}</div></div>
    <div class="kpi-card" style="border-top-color:#f59c1a"><div class="kpi-label">Total UJP</div><div class="kpi-value">${fmt(d.ujp)}</div></div>
    <div class="kpi-card" style="border-top-color:#22c55e"><div class="kpi-label">Total Insentif</div><div class="kpi-value">${fmt(d.ins)}</div></div>
  `;
}

function renderSummary() {
  const rows = getSites().map(s=>({s,d:agg([s],getMonths()),type:NK.includes(s)?'NDC':'Hub'})).filter(r=>r.d.trips>0).sort((a,b)=>b.d.ins-a.d.ins);
  document.getElementById('summaryBody').innerHTML = rows.map(r=>`<tr><td style="color:${SITE_COLORS[r.s]}">${SITE_NAMES[r.s]}</td><td><span class="${r.type==='NDC'?'badge-ndc':'badge-hub'}">${r.type}</span></td><td class="r">${r.d.trips.toLocaleString()}</td><td class="r">${r.d.trips?(r.d.do_/r.d.trips).toFixed(1):'-'}</td><td class="r">${fmt(r.d.ins)}</td><td class="r" style="color:#15803d">${r.d.mh}</td><td class="r" style="color:#a16207">${r.d.mm}</td><td class="r" style="color:#dc2626">${r.d.ml}</td></tr>`).join('');
}

function renderMPP() {
  const filtered = ALL_MPP.filter(m=>getSites().includes(m.site) && getMonths().includes(m.month)).sort((a,b)=>b.ins-a.ins);
  document.getElementById('mppBody').innerHTML = filtered.slice(0,200).map(r=>`<tr><td>${r.name}</td><td>${r.role}</td><td>${SITE_NAMES[r.site]||r.site}</td><td>${r.month}</td><td class="r">Rp ${r.ins.toLocaleString()}</td><td><span style="background:${r.cat==='High'?'#dcfce7':(r.cat==='Mid'?'#fef9c3':'#fee2e2')};padding:2px 8px;border-radius:12px">${r.cat}</span></td></tr>`).join('');
}

function renderMap() {
  if(!mapInstance){ mapInstance=L.map('map').setView([-3,118],5); L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(mapInstance); }
  Object.values(mapInstance._layers).forEach(l=>{if(l._popup) mapInstance.removeLayer(l);});
  getSites().forEach(sk=>{
    const c=SITE_COORDS[sk]; if(!c) return;
    const d=agg([sk],getMonths());
    L.circleMarker([c.lat,c.lng],{radius:8,fillColor:SITE_COLORS[sk]||'#023188',color:'white',weight:2,fillOpacity:0.8})
      .bindPopup(`<b>${SITE_NAMES[sk]}</b><br>Trip: ${d.trips.toLocaleString()}<br>Insentif: ${fmt(d.ins)}`).addTo(mapInstance);
  });
  setTimeout(()=>mapInstance.invalidateSize(),100);
}

function showPage(p){
  document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
  document.getElementById(`page-${p}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
  if(event.target.classList) event.target.classList.add('active');
  if(p==='map' && mapInstance) setTimeout(()=>mapInstance.invalidateSize(),100);
}

function setSite(s,btn){
  currentSite=s;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderAll();
  if(document.getElementById('page-map').classList.contains('active')) renderMap();
}
function setMonth(){
  currentMonth=document.getElementById('monthSelect').value;
  renderAll();
  if(document.getElementById('page-map').classList.contains('active')) renderMap();
}
function renderAll(){ renderKPI(); renderSummary(); renderMPP(); }

loadData();
setInterval(loadData, 600000);
</script>
</body>
</html>
