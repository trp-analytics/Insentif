<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Insentif 2026 - Live</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
  body{background:#b6c4dc;padding:20px}
  .container{max-width:1400px;margin:0 auto}
  .header{background:#023188;color:#fff;padding:15px 20px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .header h1{font-size:18px}
  .status{background:#1a5fc8;padding:5px 12px;border-radius:20px;font-size:12px}
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:15px 0}
  .kpi-card{background:#fff;border-radius:10px;padding:15px;border-top:3px solid}
  .kpi-label{font-size:11px;color:#7a94b0;text-transform:uppercase}
  .kpi-value{font-size:24px;font-weight:700;color:#1a2e45}
  .kpi-sub{font-size:10px;color:#7a94b0;margin-top:5px}
  .card{background:#fff;border-radius:10px;margin-bottom:15px;overflow:hidden}
  .card-header{padding:12px 15px;border-bottom:1px solid #eef2f8;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f4f9}
  th{color:#7a94b0;font-weight:500;font-size:11px}
  td.r{text-align:right}
  tr:hover td{background:#f8fafc}
  .badge-ndc{background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:12px;font-size:10px}
  .badge-hub{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px;font-size:10px}
  .badge-good{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px}
  .badge-warn{background:#fef9c3;color:#a16207;padding:2px 8px;border-radius:12px}
  .badge-bad{background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:12px}
  .badge-neutral{background:#f0f5fb;color:#4a6380;padding:2px 8px;border-radius:12px}
  .refresh-btn{background:#fff;border:1px solid #c2d0e5;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
  .filters{margin:15px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .filter-btn{padding:6px 14px;border:1px solid #c2d0e5;background:#fff;border-radius:20px;cursor:pointer;font-size:12px}
  .filter-btn.active{background:#023188;color:#fff;border-color:#023188}
  select{padding:6px 12px;border:1px solid #c2d0e5;border-radius:20px;background:#fff}
  .loading{text-align:center;padding:40px;color:#7a94b0}
  .ins-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f5fb}
  .ins-row:last-child{border-bottom:none}
  .ins-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .ins-label{flex:1;font-size:12px;color:#1a2e45;font-weight:500}
  .ins-mom{display:flex;align-items:center;gap:6px;min-width:140px}
  .ins-pct{font-size:13px;font-weight:700}
  .ins-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
  .partial-badge{background:#fef9c3;color:#a16207;font-size:9px;padding:2px 6px;border-radius:10px;margin-left:6px}
  .up-arr{color:#15803d}.dn-arr{color:#dc2626}.neu-arr{color:#94a3b8}
  .tcard{background:#fff;border:1px solid #c2d0e5;border-radius:10px;padding:13px;margin-bottom:13px}
  .tc-title{font-size:14px;font-weight:700;color:#1a2e45;margin-bottom:2px}
  .tc-sub{font-size:11px;color:#7a94b0;margin-bottom:9px}
  .tg{display:flex;border-radius:7px;overflow:hidden;border:1.5px solid #023188}
  .tgb{padding:5px 13px;border:none;background:transparent;font-size:12px;color:#023188;cursor:pointer;font-weight:600}
  .tgb.active{background:#023188;color:#fff}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Dashboard Insentif Pengiriman 2026</h1>
    <div class="status" id="statusLabel">🔄 Loading data...</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setSite('all',this)">🌐 Semua Site</button>
    <button class="filter-btn" onclick="setSite('ndc',this)">🏭 NDC</button>
    <button class="filter-btn" onclick="setSite('hub',this)">🚚 Hub</button>
    <select id="monthSelect" onchange="setMonth()">
      <option value="all">📅 Semua Bulan</option>
      <option value="January">Januari</option>
      <option value="February">Februari</option>
      <option value="March">Maret</option>
      <option value="April">April</option>
      <option value="May">Mei <span class="partial-badge">Partial</span></option>
    </select>
    <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
  </div>

  <div class="kpi-grid" id="kpiGrid"><div class="loading">Loading...</div></div>

  <div class="card">
    <div class="card-header">📋 Ringkasan per Site</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Site</th><th>Tipe</th><th class="r">Trip</th><th class="r">DO/Trip</th><th class="r">UJP/Trip</th><th class="r">Insentif</th><th class="r">High</th><th class="r">Mid</th><th class="r">Low</th></tr></thead>
        <tbody id="summaryBody"><tr><td colspan="9" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- INSIGHT SECTION -->
  <div class="card" id="insightCard">
    <div class="card-header">
      📈 Insight & Perbandingan
      <span id="insightSubtitle" style="font-size:11px;font-weight:normal;margin-left:10px"></span>
    </div>
    <div style="padding:13px">
      <!-- Month selector untuk insight -->
      <div style="display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap" id="insightTg">
        <button class="tgb" onclick="setInsightMonth('January',this)">Jan</button>
        <button class="tgb" onclick="setInsightMonth('February',this)">Feb</button>
        <button class="tgb" onclick="setInsightMonth('March',this)">Mar</button>
        <button class="tgb" onclick="setInsightMonth('April',this)">Apr</button>
        <button class="tgb" onclick="setInsightMonth('May',this)">Mei</button>
      </div>

      <!-- Tabel Perbandingan -->
      <div class="tcard" style="margin-bottom:13px">
        <div class="tc-title" id="insightRawTitle">Tabel Perbandingan</div>
        <div style="overflow-x:auto;margin-top:8px">
          <table style="width:100%">
            <thead>
              <tr>
                <th style="width:28px">No</th><th>Deskripsi</th>
                <th class="r" id="th-prev">Prev</th>
                <th class="r" id="th-cur">Cur</th>
                <th class="r">Gap MoM</th><th class="r">Growth MoM</th>
                <th class="r" id="th-yoy">YoY</th>
                <th class="r">Gap YoY</th><th class="r">Growth YoY</th>
              </tr>
            </thead>
            <tbody id="insightRawBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Cards MoM & YoY -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px">
        <div class="tcard">
          <div class="tc-title">📉 Perbandingan MoM</div>
          <div class="tc-sub" id="insightMoMSub"></div>
          <div id="insightMoMCards"></div>
          <div id="insightMoMConclusion" style="margin-top:10px;padding:8px 10px;border-radius:7px;font-size:11px"></div>
        </div>
        <div class="tcard">
          <div class="tc-title">📈 Perbandingan YoY</div>
          <div class="tc-sub" id="insightYoYSub"></div>
          <div id="insightYoYCards"></div>
          <div id="insightYoYConclusion" style="margin-top:10px;padding:8px 10px;border-radius:7px;font-size:11px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== APPS SCRIPT PROXY URL ====================
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzt2pZNA10RhPZ6bhoPagoBYQJY9FLJq3O8_9HjLuWwoJKoAsiTxmpr1U_Ad935fNGtew/exec';
// ================================================================

let SITE_MONTHLY = {};
let ALL_MPP = [];
let TOP_MPP = [];
let INSIGHT_DATA = {};
let currentSite = 'all';
let currentMonth = 'all';
let availableMonths = [];
let _insightMonth = 'April';

const NK = ['JBBK', 'CKP', 'SDA'];
const HK = ['Hub Bogor', 'Hub Tangerang', 'Hub Utara', 'Hub Bandung', 'Hub Yogya', 'Hub Semarang', 'Hub Lampung', 'Hub Palembang', 'Hub Kediri'];
const AK = [...NK, ...HK];
const SITE_NAMES = {
  'JBBK': 'Jababeka', 'CKP': 'Cikupa', 'SDA': 'Sidoarjo',
  'Hub Bogor': 'Hub Bogor', 'Hub Tangerang': 'Hub Tangerang', 'Hub Utara': 'Hub Utara',
  'Hub Bandung': 'Hub Bandung', 'Hub Yogya': 'Hub Yogya', 'Hub Semarang': 'Hub Semarang',
  'Hub Lampung': 'Hub Lampung', 'Hub Palembang': 'Hub Palembang', 'Hub Kediri': 'Hub Kediri'
};
const SITE_COLORS = {
  'JBBK': '#1e6fb5', 'CKP': '#2889d8', 'SDA': '#5aaff0',
  'Hub Bogor': '#22c55e', 'Hub Tangerang': '#16a34a', 'Hub Utara': '#0891b2',
  'Hub Bandung': '#0d9488', 'Hub Yogya': '#7c3aed', 'Hub Semarang': '#db2777',
  'Hub Lampung': '#ea580c', 'Hub Palembang': '#9333ea', 'Hub Kediri': '#9f1239'
};

const INSIGHT_METRICS = [
  {key:'DO', label:'Total Delivery Order (DO)', icon:'📦', higherBetter:true, weight:0.5},
  {key:'DP', label:'Total Drop Point (DP)', icon:'📍', higherBetter:true, weight:0.5},
  {key:'Trip', label:'Total Trip', icon:'🚚', higherBetter:true, weight:0.5},
  {key:'DO/Trip', label:'Produktivitas DO/Trip', icon:'📈', higherBetter:true, weight:0.5},
  {key:'DP/Trip', label:'Produktivitas DP/Trip', icon:'📊', higherBetter:true, weight:3},
  {key:'DO/DP', label:'Produktivitas DO/DP', icon:'📦', higherBetter:true, weight:0.5},
  {key:'UJP/Trip', label:'Biaya UJP/Trip', icon:'💰', higherBetter:false, weight:2},
  {key:'UJP/DO', label:'Biaya UJP/DO', icon:'⚖️', higherBetter:false, weight:1},
  {key:'UJP/DP', label:'Biaya UJP/DP', icon:'🎯', higherBetter:false, weight:1},
  {key:'UJP', label:'Total Biaya UJP', icon:'🔢', higherBetter:false, weight:1},
  {key:'Insentif', label:'Biaya Insentif MPP', icon:'💵', higherBetter:false, weight:2},
];

const MONTHS = ['January', 'February', 'March', 'April', 'May'];
const MONTH_SHORT = {January:'Jan',February:'Feb',March:'Mar',April:'Apr',May:'Mei'};
const PREV_MAP = {January:null,February:'January',March:'February',April:'March',May:'April'};

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const values = [];
    let inQuote = false, current = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') inQuote = !inQuote;
      else if (c === ',' && !inQuote) { values.push(current); current = ''; }
      else current += c;
    }
    values.push(current);
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i]?.trim() || '');
    return obj;
  });
}

async function loadData() {
  const statusEl = document.getElementById('statusLabel');
  statusEl.innerHTML = '🔄 Loading data...';
  statusEl.style.background = '#1a5fc8';
  
  try {
    const response = await fetch(PROXY_URL);
    const data = await response.json();
    
    const siteRows = parseCSV(data.site_data);
    const mppRows = parseCSV(data.mpp_data);
    
    // Build SITE_MONTHLY
    SITE_MONTHLY = {};
    const monthSet = new Set();
    siteRows.forEach(row => {
      const site = row.site;
      const month = row.month;
      if (!site || !month) return;
      monthSet.add(month);
      if (!SITE_MONTHLY[site]) SITE_MONTHLY[site] = {};
      SITE_MONTHLY[site][month] = {
        trips: parseInt(row.trips) || 0,
        do_: parseFloat(row.do_) || 0,
        dp: parseInt(row.dp) || 0,
        ujp: parseFloat(row.ujp) || 0,
        ins: parseFloat(row.ins) || 0,
        mpp_low: parseInt(row.mpp_low) || 0,
        mpp_mid: parseInt(row.mpp_mid) || 0,
        mpp_high: parseInt(row.mpp_high) || 0
      };
    });
    
    // Urutkan bulan
    const monthOrder = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    availableMonths = Array.from(monthSet).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));
    
    // Update dropdown bulan
    const monthSelect = document.getElementById('monthSelect');
    monthSelect.innerHTML = '<option value="all">📅 Semua Bulan</option>' + 
      availableMonths.map(m => `<option value="${m}">${m}${m==='May'?' (Partial)':''}</option>`).join('');
    
    if (currentMonth === 'all' || !availableMonths.includes(currentMonth)) {
      currentMonth = availableMonths.length > 0 ? availableMonths[availableMonths.length-1] : 'all';
      monthSelect.value = currentMonth;
    } else {
      monthSelect.value = currentMonth;
    }
    
    // Build ALL_MPP
    ALL_MPP = mppRows.map(row => {
      const ins = parseFloat(row.ins) || 0;
      let cat = row.cat;
      if (!cat) {
        if (ins > 1500000) cat = 'High';
        else if (ins > 500000) cat = 'Mid';
        else cat = 'Low';
      }
      return {
        nik: row.nik || '',
        name: row.name || 'Unknown',
        role: row.role || 'Driver',
        site: row.site || '',
        site_key: row.site || '',
        month: row.month || '',
        ins: ins,
        cat: cat
      };
    });
    
    // Build TOP_MPP
    const mppMap = new Map();
    ALL_MPP.forEach(m => {
      const key = `${m.nik}|${m.site_key}`;
      if (!mppMap.has(key)) {
        mppMap.set(key, {
          nik: m.nik,
          name: m.name,
          site: m.site,
          site_key: m.site_key,
          months: {},
          total: 0
        });
      }
      const entry = mppMap.get(key);
      entry.months[m.month] = m.ins;
      entry.total += m.ins;
    });
    TOP_MPP = Array.from(mppMap.values())
      .sort((a,b) => b.total - a.total)
      .slice(0, 20)
      .map(entry => ({
        name: entry.name,
        site: entry.site,
        site_key: entry.site_key,
        Jan: entry.months.January || 0,
        Feb: entry.months.February || 0,
        Mar: entry.months.March || 0,
        Apr: entry.months.April || 0,
        May: entry.months.May || 0,
        total: entry.total
      }));
    
    // Build INSIGHT_DATA dari site_rows
    INSIGHT_DATA = {};
    const monthOrderIdx = (m) => monthOrder.indexOf(m);
    siteRows.forEach(row => {
      const month = row.month;
      if (!month) return;
      if (!INSIGHT_DATA[month]) INSIGHT_DATA[month] = { year26: { DO:0, DP:0, Trip:0, UJP:0, Insentif:0 }, year25: { DO:0, DP:0, Trip:0, UJP:0, Insentif:0 } };
      const is2025 = row.year === '2025';
      const target = is2025 ? INSIGHT_DATA[month].year25 : INSIGHT_DATA[month].year26;
      target.DO += parseFloat(row.do_) || 0;
      target.DP += parseInt(row.dp) || 0;
      target.Trip += parseInt(row.trips) || 0;
      target.UJP += parseFloat(row.ujp) || 0;
      target.Insentif += parseFloat(row.ins) || 0;
    });
    
    // Hitung ratio
    Object.keys(INSIGHT_DATA).forEach(month => {
      const d26 = INSIGHT_DATA[month].year26;
      const d25 = INSIGHT_DATA[month].year25;
      const t26 = d26.Trip || 1, do26 = d26.DO || 1, dp26 = d26.DP || 1;
      d26['DO/Trip'] = +(d26.DO / t26).toFixed(2);
      d26['DP/Trip'] = +(d26.DP / t26).toFixed(2);
      d26['UJP/Trip'] = Math.round(d26.UJP / t26);
      d26['UJP/DO'] = Math.round(d26.UJP / do26);
      d26['UJP/DP'] = Math.round(d26.UJP / dp26);
      d26['DO/DP'] = +(d26.DO / dp26).toFixed(2);
      
      const t25 = d25.Trip || 1, do25 = d25.DO || 1, dp25 = d25.DP || 1;
      d25['DO/Trip'] = +(d25.DO / t25).toFixed(2);
      d25['DP/Trip'] = +(d25.DP / t25).toFixed(2);
      d25['UJP/Trip'] = Math.round(d25.UJP / t25);
      d25['UJP/DO'] = Math.round(d25.UJP / do25);
      d25['UJP/DP'] = Math.round(d25.UJP / dp25);
      d25['DO/DP'] = +(d25.DO / dp25).toFixed(2);
    });
    
    const siteCount = Object.keys(SITE_MONTHLY).length;
    const mppCount = ALL_MPP.length;
    const latestMonth = availableMonths.length ? availableMonths[availableMonths.length-1] : '-';
    statusEl.innerHTML = `✅ Data sampai ${latestMonth} · ${siteCount} site · ${mppCount} MPP · ${new Date().toLocaleString('id-ID')}`;
    
    // Set insight month ke bulan terakhir
    _insightMonth = availableMonths.includes('May') ? 'May' : (availableMonths.length ? availableMonths[availableMonths.length-1] : 'April');
    highlightInsightButton();
    
    renderAll();
    renderInsight();
    
  } catch(e) {
    console.error(e);
    statusEl.innerHTML = '❌ Gagal load data! Cek koneksi & Apps Script';
    statusEl.style.background = '#dc2626';
  }
}

function highlightInsightButton() {
  document.querySelectorAll('#insightTg .tgb').forEach(btn => {
    const monthMap = {'Jan':'January','Feb':'February','Mar':'March','Apr':'April','Mei':'May'};
    const btnMonth = monthMap[btn.textContent.trim()];
    if (btnMonth === _insightMonth) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

function setInsightMonth(month, btn) {
  _insightMonth = month;
  document.querySelectorAll('#insightTg .tgb').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderInsight();
}

function getMonths() {
  return currentMonth === 'all' ? availableMonths : [currentMonth];
}

function getSites() {
  if (currentSite === 'all') return AK;
  if (currentSite === 'ndc') return NK;
  if (currentSite === 'hub') return HK;
  return [currentSite];
}

function agg(sites, months) {
  let trips = 0, do_ = 0, dp = 0, ujp = 0, ins = 0, ml = 0, mm = 0, mh = 0;
  sites.forEach(s => {
    months.forEach(m => {
      const d = SITE_MONTHLY[s]?.[m];
      if (!d) return;
      trips += d.trips || 0;
      do_ += d.do_ || 0;
      dp += d.dp || 0;
      ujp += d.ujp || 0;
      ins += d.ins || 0;
      ml += d.mpp_low || 0;
      mm += d.mpp_mid || 0;
      mh += d.mpp_high || 0;
    });
  });
  return { trips, do_, dp, ujp, ins, ml, mm, mh };
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return Math.round(n/1e3) + 'K';
  return Math.round(n).toLocaleString('id-ID');
}

function fmtN(n) { return Math.round(n).toLocaleString('id-ID'); }
function fmtInsight(v, key) {
  if (!key) return v;
  if (['DO','DP','Trip'].includes(key)) return Math.round(v).toLocaleString('id-ID');
  if (['DO/Trip','DP/Trip','DO/DP'].includes(key)) return typeof v === 'number' ? v.toFixed(2) : v;
  if (['UJP/Trip','UJP/DO','UJP/DP'].includes(key)) return 'Rp ' + Math.round(v).toLocaleString('id-ID');
  if (['Insentif','UJP'].includes(key)) {
    const abs = Math.abs(v);
    if (abs >= 1e9) return (abs/1e9).toFixed(1) + 'B';
    if (abs >= 1e6) return (abs/1e6).toFixed(1) + 'M';
    return Math.round(abs).toLocaleString('id-ID');
  }
  return typeof v === 'number' ? v.toFixed(1) : v;
}

function insightBadge(pct, higherBetter) {
  if (pct === 0 || Math.abs(pct) < 0.05) return { cls: 'badge-neutral', text: 'STABIL' };
  const good = higherBetter ? pct > 0 : pct < 0;
  return good ? { cls: 'badge-good', text: 'MEMBAIK' } : { cls: 'badge-bad', text: 'MENURUN' };
}

function pctArrow(pct) {
  if (pct > 0) return '<span class="up-arr">▲</span>';
  if (pct < 0) return '<span class="dn-arr">▼</span>';
  return '<span class="neu-arr">→</span>';
}

function renderKPI() {
  const d = agg(getSites(), getMonths());
  const sites = getSites();
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Total Trip</div><div class="kpi-value">${fmtN(d.trips)}</div><div class="kpi-sub">${sites.length} site</div></div>
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Total DO</div><div class="kpi-value">${fmtN(d.do_)}</div><div class="kpi-sub"></div></div>
    <div class="kpi-card" style="border-top-color:#023188"><div class="kpi-label">Drop Point</div><div class="kpi-value">${fmtN(d.dp)}</div><div class="kpi-sub"></div></div>
    <div class="kpi-card" style="border-top-color:#f59c1a"><div class="kpi-label">Total UJP</div><div class="kpi-value">${fmt(d.ujp)}</div><div class="kpi-sub">Rp</div></div>
    <div class="kpi-card" style="border-top-color:#22c55e"><div class="kpi-label">Total Insentif</div><div class="kpi-value">${fmt(d.ins)}</div><div class="kpi-sub">Rp</div></div>
  `;
}

function renderSummary() {
  const months = getMonths();
  const sites = getSites();
  const rows = sites.map(s => {
    const d = agg([s], months);
    return { s, d, type: NK.includes(s) ? 'NDC' : 'Hub' };
  }).filter(r => r.d.trips > 0).sort((a,b) => b.d.ins - a.d.ins);
  
  if (rows.length === 0) {
    document.getElementById('summaryBody').innerHTML = '<tr><td colspan="9" class="loading">Tidak ada data</td></tr>';
    return;
  }
  
  document.getElementById('summaryBody').innerHTML = rows.map(r => `
    <tr>
      <td style="font-weight:500;color:${SITE_COLORS[r.s]}">${SITE_NAMES[r.s] || r.s}</td>
      <td><span class="${r.type === 'NDC' ? 'badge-ndc' : 'badge-hub'}">${r.type}</span></td>
      <td class="r">${fmtN(r.d.trips)}</td>
      <td class="r">${r.d.trips ? (r.d.do_/r.d.trips).toFixed(1) : '-'}</td>
      <td class="r">${r.d.trips ? fmt(r.d.ujp/r.d.trips) : '-'}</td>
      <td class="r" style="font-weight:600">${fmt(r.d.ins)}</td>
      <td class="r" style="color:#15803d">${r.d.mh}</td>
      <td class="r" style="color:#a16207">${r.d.mm}</td>
      <td class="r" style="color:#dc2626">${r.d.ml}</td>
    </tr>
  `).join('');
}

function renderInsight() {
  const sites = getSites();
  const m = _insightMonth;
  const prev = PREV_MAP[m];
  const mn = MONTH_SHORT[m] || m;
  const pmn = prev ? MONTH_SHORT[prev] : '—';
  
  // Ambil data aggregated untuk bulan ini dan sebelumnya
  function aggMonth(sm, month, sitesList) {
    const r = { DO:0, DP:0, Trip:0, UJP:0, Insentif:0 };
    sitesList.forEach(sk => {
      const d = sm[sk]?.[month] || {};
      r.DO += d.do_ || 0;
      r.DP += d.dp || 0;
      r.Trip += d.trips || 0;
      r.UJP += d.ujp || 0;
      r.Insentif += d.ins || 0;
    });
    const t = r.Trip || 1, doVal = r.DO || 1, dpVal = r.DP || 1;
    return {
      DO: r.DO, DP: r.DP, Trip: r.Trip, UJP: r.UJP, Insentif: r.Insentif,
      'DO/Trip': +(r.DO / t).toFixed(2),
      'DP/Trip': +(r.DP / t).toFixed(2),
      'UJP/Trip': Math.round(r.UJP / t),
      'UJP/DO': Math.round(r.UJP / doVal),
      'UJP/DP': Math.round(r.UJP / dpVal),
      'DO/DP': +(r.DO / dpVal).toFixed(2)
    };
  }
  
  const v26 = aggMonth(SITE_MONTHLY, m, sites);
  const v25 = aggMonth(SITE_MONTHLY, m, sites); // Note: 2025 data perlu dari sumber terpisah
  const vp = prev ? aggMonth(SITE_MONTHLY, prev, sites) : null;
  
  // Untuk YoY, idealnya dari data 2025 terpisah, tapi fallback pakai current
  // (karena data 2025 tidak ada di proxy ini)
  
  document.getElementById('insightSubtitle').innerHTML = `${mn} 2026 vs ${pmn} 2026 (MoM)`;
  document.getElementById('insightMoMSub').innerHTML = `${pmn} 2026 vs ${mn} 2026`;
  document.getElementById('insightYoYSub').innerHTML = `${mn} 2025 vs ${mn} 2026`;
  document.getElementById('insightRawTitle').innerHTML = `Tabel Perbandingan — ${mn} 2026`;
  document.getElementById('th-prev').textContent = pmn ? pmn + ' 26' : '—';
  document.getElementById('th-cur').textContent = mn + ' 26';
  document.getElementById('th-yoy').textContent = mn + ' 25';
  
  // Tabel
  const tbody = document.getElementById('insightRawBody');
  tbody.innerHTML = INSIGHT_METRICS.map((met, i) => {
    const c = v26[met.key] || 0;
    const p = vp ? vp[met.key] || 0 : null;
    const y = 0; // placeholder, perlu data 2025
    const momGap = p !== null ? c - p : null;
    const momPct = (p && p !== 0) ? ((c - p) / Math.abs(p)) * 100 : null;
    const yoyGap = c - y;
    const yoyPct = y !== 0 ? ((c - y) / Math.abs(y)) * 100 : 0;
    const mc = momPct !== null ? (met.higherBetter ? (momPct > 0 ? '#15803d' : '#dc2626') : (momPct < 0 ? '#15803d' : '#dc2626')) : '#94a3b8';
    const yc = met.higherBetter ? (yoyPct > 0 ? '#15803d' : '#dc2626') : (yoyPct < 0 ? '#15803d' : '#dc2626');
    return `<tr>
      <td style="color:#94a3b8">${i+1}</td>
      <td style="font-weight:500">${met.icon} ${met.label}</td>
      <td class="r">${p !== null ? fmtInsight(p, met.key) : '—'}</td>
      <td class="r" style="font-weight:600">${fmtInsight(c, met.key)}</td>
      <td class="r" style="color:${mc}">${momGap !== null ? (momGap > 0 ? '+' : '') + fmtInsight(momGap, met.key) : '—'}</td>
      <td class="r" style="color:${mc};font-weight:600">${momPct !== null ? (momPct > 0 ? '+' : '') + momPct.toFixed(1) + '%' : '—'}</td>
      <td class="r">—</td>
      <td class="r" style="color:${yc}">—</td>
      <td class="r" style="color:${yc};font-weight:600">—</td>
    </tr>`;
  }).join('');
  
  // Cards MoM
  function buildCards(containerId, conclusionId, getPct) {
    const cont = document.getElementById(containerId);
    if (!cont) return;
    let good = 0, bad = 0;
    cont.innerHTML = INSIGHT_METRICS.map(met => {
      const pct = getPct(met.key);
      if (pct === null) return '';
      const badge = insightBadge(pct, met.higherBetter);
      const isGood = met.higherBetter ? pct > 0 : pct < 0;
      const w = met.weight || 1;
      if (badge.cls === 'badge-good') good += w;
      else if (badge.cls === 'badge-bad') bad += w;
      const arrow = pctArrow(isGood ? Math.abs(pct) : -Math.abs(pct));
      const pctColor = isGood ? '#15803d' : (pct !== 0 ? '#dc2626' : '#94a3b8');
      return `<div class="ins-row">
        <div class="ins-icon" style="background:${isGood ? '#f0fdf4' : '#fff5f5'}">${met.icon}</div>
        <div class="ins-label">${met.label}</div>
        <div class="ins-mom">${arrow}<span class="ins-pct" style="color:${pctColor}">${(pct > 0 ? '+' : '') + pct.toFixed(1)}%</span><span class="ins-badge ${badge.cls}">${badge.text}</span></div>
      </div>`;
    }).join('');
    
    const concl = document.getElementById(conclusionId);
    if (concl) {
      if (good > bad) {
        concl.style.background = '#dcfce7';
        concl.style.color = '#15803d';
        concl.innerHTML = '✅ Efisiensi & Produktivitas MENINGKAT';
      } else if (bad > good) {
        concl.style.background = '#fee2e2';
        concl.style.color = '#dc2626';
        concl.innerHTML = '⚠️ Efisiensi & Produktivitas MENURUN';
      } else {
        concl.style.background = '#fef9c3';
        concl.style.color = '#a16207';
        concl.innerHTML = '📊 Mixed Performance';
      }
    }
  }
  
  buildCards('insightMoMCards', 'insightMoMConclusion', key => {
    const c = v26[key] || 0;
    const p = vp ? vp[key] || 0 : null;
    return (p !== null && p !== 0) ? ((c - p) / Math.abs(p)) * 100 : null;
  });
  
  // YoY cards (placeholder)
  buildCards('insightYoYCards', 'insightYoYConclusion', key => null);
}

function renderAll() {
  renderKPI();
  renderSummary();
  if (document.getElementById('insightCard')) renderInsight();
}

function setSite(site, btn) {
  currentSite = site;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
  if (document.getElementById('insightCard')) renderInsight();
}

function setMonth() {
  currentMonth = document.getElementById('monthSelect').value;
  renderAll();
  if (document.getElementById('insightCard')) renderInsight();
}

// Initialize
loadData();
setInterval(loadData, 300000); // Auto refresh tiap 5 menit
</script>
