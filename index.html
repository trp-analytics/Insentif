<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Insentif 2026 - Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#b6c4dc;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{background:#023188;color:#fff;padding:15px 20px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px}
.status{background:#1a5fc8;padding:5px 12px;border-radius:20px;font-size:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:15px 0}
.kpi-card{background:#fff;border-radius:10px;padding:15px;border-top:3px solid}
.kpi-label{font-size:11px;color:#7a94b0;text-transform:uppercase}
.kpi-value{font-size:24px;font-weight:700;color:#1a2e45}
.kpi-sub{font-size:10px;color:#7a94b0;margin-top:5px}
.card{background:#fff;border-radius:10px;margin-bottom:15px;overflow:hidden}
.card-header{padding:12px 15px;border-bottom:1px solid #eef2f8;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f4f9}
th{color:#7a94b0;font-weight:500;font-size:11px}
td.r{text-align:right}
tr:hover td{background:#f8fafc}
.badge-ndc{background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:12px;font-size:10px}
.badge-hub{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px;font-size:10px}
.badge-high{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:12px}
.badge-mid{background:#fef9c3;color:#a16207;padding:2px 8px;border-radius:12px}
.badge-low{background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:12px}
.refresh-btn{background:#fff;border:1px solid #c2d0e5;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.filters{margin:15px 0;display:flex;gap:10px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid #c2d0e5;background:#fff;border-radius:20px;cursor:pointer;font-size:12px}
.filter-btn.active{background:#023188;color:#fff;border-color:#023188}
select{padding:6px 12px;border:1px solid #c2d0e5;border-radius:20px;background:#fff}
.loading{text-align:center;padding:40px;color:#7a94b0}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Dashboard Insentif Pengiriman 2026</h1>
    <div class="status" id="statusLabel">🔄 Loading data...</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setSite('all',this)">🌐 Semua Site</button>
    <button class="filter-btn" onclick="setSite('ndc',this)">🏭 NDC</button>
    <button class="filter-btn" onclick="setSite('hub',this)">🚚 Hub</button>
    <select id="monthSelect" onchange="setMonth()">
      <option value="all">📅 Semua Bulan</option>
      <option value="January">Januari</option>
      <option value="February">Februari</option>
      <option value="March">Maret</option>
      <option value="April">April</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
  </div>

  <div class="kpi-grid" id="kpiGrid"></td><div class="loading">Loading...</div></tr></div>

  <div class="card">
    <div class="card-header">📋 Ringkasan per Site</div>
    <div style="overflow-x:auto">
      <table id="summaryTable">
        <thead><tr><th>Site</th><th>Tipe</th><th class="r">Trip</th><th class="r">DO/Trip</th><th class="r">UJP/Trip</th><th class="r">Insentif</th><th class="r">High</th><th class="r">Mid</th><th class="r">Low</th></tr></thead>
        <tbody id="summaryBody"><tr><td colspan="9" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">👥 Daftar MPP</div>
    <div style="overflow-x:auto">
      <table id="mppTable">
        <thead><tr><th>Nama</th><th>Role</th><th>Site</th><th>Bulan</th><th class="r">Insentif</th><th>Kategori</th></tr></thead>
        <tbody id="mppBody"><tr><td colspan="6" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ==================== 🔥 URL GSheet LO (SUDAH LANGSUNG) 🔥 ====================
const SITE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyI8mksdqrv4RF0OBH_Hi2BdZ17fYNBU2_scPnUFb0EkI8QFFRwTEpJtoQvKoXJQaWUoGC7bOhGtB1/pub?output=csv';
const MPP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfY4FSedZDglBnuz8UWZXdhg9LJGDKcAjGEYENyL8rTXAqguTTqZL0IQfwhC0KGFh_8POa0oqM8KMf/pub?output=csv';
// ============================================================================

let SITE_MONTHLY = {};
let ALL_MPP = [];
let currentSite = 'all';
let currentMonth = 'all';

const MONTHS = ['January','February','March','April'];
const NK = ['JBBK', 'CKP', 'SDA'];
const HK = ['Hub Bogor', 'Hub Tangerang', 'Hub Utara', 'Hub Bandung', 'Hub Yogya', 'Hub Semarang', 'Hub Lampung', 'Hub Palembang', 'Hub Kediri'];
const AK = [...NK, ...HK];
const SITE_NAMES = {
  'JBBK': 'Jababeka', 'CKP': 'Cikupa', 'SDA': 'Sidoarjo',
  'Hub Bogor': 'Hub Bogor', 'Hub Tangerang': 'Hub Tangerang', 'Hub Utara': 'Hub Utara',
  'Hub Bandung': 'Hub Bandung', 'Hub Yogya': 'Hub Yogya', 'Hub Semarang': 'Hub Semarang',
  'Hub Lampung': 'Hub Lampung', 'Hub Palembang': 'Hub Palembang', 'Hub Kediri': 'Hub Kediri'
};
const SITE_COLORS = {
  'JBBK': '#1e6fb5', 'CKP': '#2889d8', 'SDA': '#5aaff0',
  'Hub Bogor': '#22c55e', 'Hub Tangerang': '#16a34a', 'Hub Utara': '#0891b2',
  'Hub Bandung': '#0d9488', 'Hub Yogya': '#7c3aed', 'Hub Semarang': '#db2777',
  'Hub Lampung': '#ea580c', 'Hub Palembang': '#9333ea', 'Hub Kediri': '#9f1239'
};

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const values = [];
    let inQuote = false, current = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') inQuote = !inQuote;
      else if (c === ',' && !inQuote) { values.push(current); current = ''; }
      else current += c;
    }
    values.push(current);
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i]?.trim() || '');
    return obj;
  });
}

async function loadData() {
  document.getElementById('statusLabel').innerHTML = '🔄 Loading data...';
  document.getElementById('statusLabel').style.background = '#1a5fc8';
  
  try {
    const [siteRes, mppRes] = await Promise.all([
      fetch(SITE_SHEET_URL),
      fetch(MPP_SHEET_URL)
    ]);
    
    const siteCsv = await siteRes.text();
    const mppCsv = await mppRes.text();
    
    const siteRows = parseCSV(siteCsv);
    SITE_MONTHLY = {};
    
    siteRows.forEach(row => {
      const site = row.site;
      const month = row.month;
      if (!site || !month) return;
      if (!SITE_MONTHLY[site]) SITE_MONTHLY[site] = {};
      SITE_MONTHLY[site][month] = {
        trips: parseInt(row.trips) || 0,
        do_: parseFloat(row.do_) || 0,
        dp: parseInt(row.dp) || 0,
        ujp: parseFloat(row.ujp) || 0,
        ins: parseFloat(row.ins) || 0,
        mpp_low: parseInt(row.mpp_low) || 0,
        mpp_mid: parseInt(row.mpp_mid) || 0,
        mpp_high: parseInt(row.mpp_high) || 0
      };
    });
    
    const mppRows = parseCSV(mppCsv);
    ALL_MPP = mppRows.map(row => {
      const ins = parseFloat(row.ins) || 0;
      let cat = row.cat;
      if (!cat) {
        if (ins > 1500000) cat = 'High';
        else if (ins > 500000) cat = 'Mid';
        else cat = 'Low';
      }
      return {
        name: row.name || 'Unknown',
        role: row.role || '-',
        site: row.site || '',
        month: row.month || '',
        ins: ins,
        cat: cat
      };
    });
    
    const siteCount = Object.keys(SITE_MONTHLY).length;
    const mppCount = ALL_MPP.length;
    document.getElementById('statusLabel').innerHTML = `✅ ${siteCount} site · ${mppCount} MPP · ${new Date().toLocaleString('id-ID')}`;
    renderAll();
    
  } catch(e) {
    console.error(e);
    document.getElementById('statusLabel').innerHTML = '❌ Gagal load data! Cek koneksi';
    document.getElementById('statusLabel').style.background = '#dc2626';
  }
}

function getMonths() {
  return currentMonth === 'all' ? MONTHS : [currentMonth];
}

function getSites() {
  if (currentSite === 'all') return AK;
  if (currentSite === 'ndc') return NK;
  if (currentSite === 'hub') return HK;
  return [currentSite];
}

function agg(sites, months) {
  let trips = 0, do_ = 0, dp = 0, ujp = 0, ins = 0, ml = 0, mm = 0, mh = 0;
  sites.forEach(s => {
    months.forEach(m => {
      const d = SITE_MONTHLY[s]?.[m];
      if (!d) return;
      trips += d.trips || 0;
      do_ += d.do_ || 0;
      dp += d.dp || 0;
      ujp += d.ujp || 0;
      ins += d.ins || 0;
      ml += d.mpp_low || 0;
      mm += d.mpp_mid || 0;
      mh += d.mpp_high || 0;
    });
  });
  return { trips, do_, dp, ujp, ins, ml, mm, mh };
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return Math.round(n/1e3) + 'K';
  return Math.round(n).toLocaleString('id-ID');
}

function renderKPI() {
  const d = agg(getSites(), getMonths());
  const sites = getSites();
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card" style="border-top-color:#023188">
      <div class="kpi-label">Total Trip</div>
      <div class="kpi-value">${d.trips.toLocaleString('id-ID')}</div>
      <div class="kpi-sub">${sites.length} site</div>
    </div>
    <div class="kpi-card" style="border-top-color:#023188">
      <div class="kpi-label">Total DO</div>
      <div class="kpi-value">${d.do_.toLocaleString('id-ID')}</div>
      <div class="kpi-sub"></div>
    </div>
    <div class="kpi-card" style="border-top-color:#023188">
      <div class="kpi-label">Drop Point</div>
      <div class="kpi-value">${d.dp.toLocaleString('id-ID')}</div>
      <div class="kpi-sub"></div>
    </div>
    <div class="kpi-card" style="border-top-color:#f59c1a">
      <div class="kpi-label">Total UJP</div>
      <div class="kpi-value">${fmt(d.ujp)}</div>
      <div class="kpi-sub">Rp</div>
    </div>
    <div class="kpi-card" style="border-top-color:#22c55e">
      <div class="kpi-label">Total Insentif</div>
      <div class="kpi-value">${fmt(d.ins)}</div>
      <div class="kpi-sub">Rp</div>
    </div>
  `;
}

function renderSummary() {
  const months = getMonths();
  const sites = getSites();
  const rows = sites.map(s => {
    const d = agg([s], months);
    return { s, d, type: NK.includes(s) ? 'NDC' : 'Hub' };
  }).filter(r => r.d.trips > 0).sort((a,b) => b.d.ins - a.d.ins);
  
  if (rows.length === 0) {
    document.getElementById('summaryBody').innerHTML = '<tr><td colspan="9" class="loading">Tidak ada data</td></tr>';
    return;
  }
  
  document.getElementById('summaryBody').innerHTML = rows.map(r => `
    <tr>
      <td style="font-weight:500;color:${SITE_COLORS[r.s]}">${SITE_NAMES[r.s] || r.s}</td>
      <td><span class="${r.type === 'NDC' ? 'badge-ndc' : 'badge-hub'}">${r.type}</span></td>
      <td class="r">${r.d.trips.toLocaleString('id-ID')}</td>
      <td class="r">${r.d.trips ? (r.d.do_/r.d.trips).toFixed(1) : '-'}</td>
      <td class="r">${r.d.trips ? fmt(r.d.ujp/r.d.trips) : '-'}</td>
      <td class="r" style="font-weight:600">${fmt(r.d.ins)}</td>
      <td class="r" style="color:#15803d">${r.d.mh}</td>
      <td class="r" style="color:#a16207">${r.d.mm}</td>
      <td class="r" style="color:#dc2626">${r.d.ml}</td>
    </tr>
  `).join('');
}

function renderMPP() {
  const months = getMonths();
  const sites = getSites();
  const filtered = ALL_MPP.filter(m => sites.includes(m.site) && months.includes(m.month))
    .sort((a,b) => b.ins - a.ins);
  
  if (filtered.length === 0) {
    document.getElementById('mppBody').innerHTML = '<tr><td colspan="6" class="loading">Tidak ada data MPP</td></tr>';
    return;
  }
  
  document.getElementById('mppBody').innerHTML = filtered.slice(0, 200).map(r => `
    <tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.role}</td>
      <td>${SITE_NAMES[r.site] || r.site}</td>
      <td>${r.month}</td>
      <td class="r">Rp ${r.ins.toLocaleString('id-ID')}</td>
      <td><span class="badge-${r.cat === 'High' ? 'high' : (r.cat === 'Mid' ? 'mid' : 'low')}">${r.cat}</span></td>
    </tr>
  `).join('');
}

function renderAll() {
  renderKPI();
  renderSummary();
  renderMPP();
}

function setSite(site, btn) {
  currentSite = site;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
}

function setMonth() {
  currentMonth = document.getElementById('monthSelect').value;
  renderAll();
}

// Eksekusi
loadData();
setInterval(loadData, 300000); // Auto refresh tiap 5 menit
</script>
</body>
</html>
